<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>Welcome Back</h1>
        <nav>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html">Register</a>
            </div>
        </nav>
    </header>

    <div class="form-wrapper">
        <div class="form-card">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="register.html">Register</a></p>
            <p><a href="#" id="forgotPasswordLink">Forgot Password?</a></p>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Reset Password</h3>
            <p>Enter your email address to receive a password reset link.</p>
            <form id="forgotPasswordForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="resetEmail" placeholder="Email" required>
                </div>
                <button type="submit">Send Reset Link</button>
            </form>
        </div>
    </div>

    <script>
        // Password visibility toggle function
        function togglePassword() {
            let passwordInput = document.getElementById("password");
            let icon = document.querySelector(".toggle-password");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        // Email validation function
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Modal functionality
        const modal = document.getElementById("forgotPasswordModal");
        const forgotPasswordLink = document.getElementById("forgotPasswordLink");
        const closeModal = document.querySelector(".close-modal");

        // Only add event listeners if elements exist
        if (forgotPasswordLink && modal && closeModal) {
            // Wait for DOM to be fully loaded
            document.addEventListener("DOMContentLoaded", function() {
                // Ensure modal is hidden initially
                modal.style.display = "none";
                
                forgotPasswordLink.addEventListener("click", function(e) {
                    e.preventDefault();
                    modal.style.display = "block";
                });
                
                closeModal.addEventListener("click", function() {
                    modal.style.display = "none";
                });
                
                window.addEventListener("click", function(event) {
                    if (event.target === modal) {
                        modal.style.display = "none";
                    }
                });
            });
        }

        // Forgot Password Form Handler
        const forgotPasswordForm = document.getElementById("forgotPasswordForm");
        if (forgotPasswordForm) {
            forgotPasswordForm.addEventListener("submit", async (e) => {
                e.preventDefault();
                const email = document.getElementById("resetEmail").value;
                
                if (!isValidEmail(email)) {
                    alert("Please enter a valid email address.");
                    return;
                }
                
                try {
                    const response = await fetch("https://prasa-backend-final.vercel.app/api/forgot-password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email })
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        alert("Password reset link has been sent to your email.");
                        modal.style.display = "none";
                    } else {
                        alert(result.message || "Failed to send reset link. Please try again.");
                    }
                } catch (error) {
                    console.error("Forgot password error:", error);
                    alert("An error occurred. Please try again later.");
                }
            });
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
